services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-umami}
      POSTGRES_USER: ${POSTGRES_USER:-umami}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      TZ: UTC
      PGTZ: UTC
    command:
      - postgres
      - -c
      - timezone=UTC
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}"
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - umami-postgres-data:/var/lib/postgresql/data

  umami:
    image: docker.umami.is/umami-software/umami:postgresql-latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-umami}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}@postgres:5432/${POSTGRES_DB:-umami}
      APP_SECRET: ${APP_SECRET:?set APP_SECRET in .env}
      TRACKER_SCRIPT_NAME: ${TRACKER_SCRIPT_NAME:-script.js}
    ports:
      - "${UMAMI_BIND_ADDRESS:-0.0.0.0}:${UMAMI_PORT:-3001}:3000"

volumes:
  umami-postgres-data:
