services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    shm_size: 1gb
    command:
      - postgres
      - -c
      - shared_buffers=512MB
      - -c
      - work_mem=32MB
      - -c
      - maintenance_work_mem=128MB
      - -c
      - effective_cache_size=2GB
      - -c
      - max_parallel_workers_per_gather=2
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-foundation_archive}
      POSTGRES_USER: ${POSTGRES_USER:-foundation_archive}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-foundation_archive}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}"
      interval: 10s
      timeout: 5s
      retries: 10

  storage-check:
    image: alpine:3.20
    entrypoint:
      - /bin/sh
      - -lc
    command:
      - |
        set -eu
        mkdir -p "/mnt/backups/${NAS_ARCHIVE_SUBDIR:-foundation}" /mnt/backups/kubo-data /data/archive-storage-hot /data/kubo-metadata
        # kubo runs as uid 1000 (ipfs user). Pre-chown the local
        # metadata volume so the container-init.d script can populate
        # /data/kubo-metadata/datastore without permission errors.
        chown -R 1000:1000 /data/kubo-metadata
        ls -ld /mnt/backups "/mnt/backups/${NAS_ARCHIVE_SUBDIR:-foundation}" /mnt/backups/kubo-data /data/archive-storage-hot /data/kubo-metadata
    volumes:
      - cold-storage:/mnt/backups
      - hot-storage:/data/archive-storage-hot
      - kubo-metadata:/data/kubo-metadata

  db-init:
    image: foundation-archive-app:local
    build:
      context: ..
      dockerfile: Dockerfile
      # Build in the host's network namespace so apt + pnpm install can
      # use whatever DNS the host resolves with. The default buildkit
      # network is sandboxed and relies on docker's embedded resolver
      # forwarding to the daemon's configured DNS — on this node that
      # forwarder can't reach the host's systemd-resolved stub and
      # every apt-get update / pnpm install goes "Temporary failure
      # resolving" until we restart with an explicit daemon DNS (sudo).
      # `network: host` avoids the sudo step entirely.
      network: host
      args:
        SKIP_ENV_VALIDATION: 1
        ARCHIVE_SOCKET_INTERNAL_URL: ${ARCHIVE_SOCKET_INTERNAL_URL:-http://127.0.0.1:43129}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
        NEXT_PUBLIC_ARCHIVE_SOCKET_URL: ${NEXT_PUBLIC_ARCHIVE_SOCKET_URL:-http://127.0.0.1:43129}
        NEXT_PUBLIC_UMAMI_SCRIPT_URL: ${NEXT_PUBLIC_UMAMI_SCRIPT_URL:-}
        NEXT_PUBLIC_UMAMI_WEBSITE_ID: ${NEXT_PUBLIC_UMAMI_WEBSITE_ID:-}
    command:
      - pnpm
      - db:push
    env_file:
      - .env.production
    environment:
      KUBO_API_URL: ${KUBO_API_URL:-http://kubo:5001}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    volumes:
      - cold-storage:/mnt/backups
      - hot-storage:/data/archive-storage-hot

  web:
    image: foundation-archive-app:local
    build:
      context: ..
      dockerfile: Dockerfile
      # Build in the host's network namespace so apt + pnpm install can
      # use whatever DNS the host resolves with. The default buildkit
      # network is sandboxed and relies on docker's embedded resolver
      # forwarding to the daemon's configured DNS — on this node that
      # forwarder can't reach the host's systemd-resolved stub and
      # every apt-get update / pnpm install goes "Temporary failure
      # resolving" until we restart with an explicit daemon DNS (sudo).
      # `network: host` avoids the sudo step entirely.
      network: host
      args:
        SKIP_ENV_VALIDATION: 1
        ARCHIVE_SOCKET_INTERNAL_URL: ${ARCHIVE_SOCKET_INTERNAL_URL:-http://127.0.0.1:43129}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
        NEXT_PUBLIC_ARCHIVE_SOCKET_URL: ${NEXT_PUBLIC_ARCHIVE_SOCKET_URL:-http://127.0.0.1:43129}
        NEXT_PUBLIC_UMAMI_SCRIPT_URL: ${NEXT_PUBLIC_UMAMI_SCRIPT_URL:-}
        NEXT_PUBLIC_UMAMI_WEBSITE_ID: ${NEXT_PUBLIC_UMAMI_WEBSITE_ID:-}
    command:
      - pnpm
      - start
      - --hostname
      - 0.0.0.0
      - --port
      - "3000"
    env_file:
      - .env.production
    environment:
      KUBO_API_URL: ${KUBO_API_URL:-http://kubo:5001}
    networks:
      - default
      - umami_default
    depends_on:
      postgres:
        condition: service_healthy
      socket:
        condition: service_started
      archiver:
        condition: service_started
    ports:
      - "${WEB_PORT:-3000}:3000"
    restart: unless-stopped
    volumes:
      - cold-storage:/mnt/backups
      - hot-storage:/data/archive-storage-hot

  worker:
    image: foundation-archive-app:local
    build:
      context: ..
      dockerfile: Dockerfile
      # Build in the host's network namespace so apt + pnpm install can
      # use whatever DNS the host resolves with. The default buildkit
      # network is sandboxed and relies on docker's embedded resolver
      # forwarding to the daemon's configured DNS — on this node that
      # forwarder can't reach the host's systemd-resolved stub and
      # every apt-get update / pnpm install goes "Temporary failure
      # resolving" until we restart with an explicit daemon DNS (sudo).
      # `network: host` avoids the sudo step entirely.
      network: host
      args:
        SKIP_ENV_VALIDATION: 1
        ARCHIVE_SOCKET_INTERNAL_URL: ${ARCHIVE_SOCKET_INTERNAL_URL:-http://127.0.0.1:43129}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
        NEXT_PUBLIC_ARCHIVE_SOCKET_URL: ${NEXT_PUBLIC_ARCHIVE_SOCKET_URL:-http://127.0.0.1:43129}
        NEXT_PUBLIC_UMAMI_SCRIPT_URL: ${NEXT_PUBLIC_UMAMI_SCRIPT_URL:-}
        NEXT_PUBLIC_UMAMI_WEBSITE_ID: ${NEXT_PUBLIC_UMAMI_WEBSITE_ID:-}
    command:
      - pnpm
      - worker
    env_file:
      - .env.production
    environment:
      KUBO_API_URL: ${KUBO_API_URL:-http://kubo:5001}
    depends_on:
      postgres:
        condition: service_healthy
      archiver:
        condition: service_started
      kubo:
        condition: service_started
    restart: unless-stopped
    volumes:
      - cold-storage:/mnt/backups
      - hot-storage:/data/archive-storage-hot

  socket:
    image: foundation-archive-app:local
    build:
      context: ..
      dockerfile: Dockerfile
      # Build in the host's network namespace so apt + pnpm install can
      # use whatever DNS the host resolves with. The default buildkit
      # network is sandboxed and relies on docker's embedded resolver
      # forwarding to the daemon's configured DNS — on this node that
      # forwarder can't reach the host's systemd-resolved stub and
      # every apt-get update / pnpm install goes "Temporary failure
      # resolving" until we restart with an explicit daemon DNS (sudo).
      # `network: host` avoids the sudo step entirely.
      network: host
      args:
        SKIP_ENV_VALIDATION: 1
        ARCHIVE_SOCKET_INTERNAL_URL: ${ARCHIVE_SOCKET_INTERNAL_URL:-http://127.0.0.1:43129}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
        NEXT_PUBLIC_ARCHIVE_SOCKET_URL: ${NEXT_PUBLIC_ARCHIVE_SOCKET_URL:-http://127.0.0.1:43129}
        NEXT_PUBLIC_UMAMI_SCRIPT_URL: ${NEXT_PUBLIC_UMAMI_SCRIPT_URL:-}
        NEXT_PUBLIC_UMAMI_WEBSITE_ID: ${NEXT_PUBLIC_UMAMI_WEBSITE_ID:-}
    command:
      - pnpm
      - socket
    env_file:
      - .env.production
    environment:
      KUBO_API_URL: ${KUBO_API_URL:-http://kubo:5001}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${ARCHIVE_SOCKET_PORT:-43129}:${ARCHIVE_SOCKET_PORT:-43129}"
    restart: unless-stopped
    volumes:
      - cold-storage:/mnt/backups
      - hot-storage:/data/archive-storage-hot

  archiver:
    image: foundation-archive-archiver:local
    build:
      context: ..
      dockerfile: Dockerfile.archiver
      # Match the app image builds: this node's BuildKit sandbox DNS can
      # fail resolving deb.debian.org, while the host namespace resolves
      # through the working host resolver.
      network: host
    env_file:
      - .env.production
    restart: unless-stopped
    volumes:
      - cold-storage:/mnt/backups
      - hot-storage:/data/archive-storage-hot

  kubo:
    image: ipfs/kubo:release
    restart: unless-stopped
    environment:
      # Blocks live on the NAS (cold-storage mount). Flatfs writes one
      # file per block — atomic enough that CIFS handles it fine.
      IPFS_PATH: /mnt/backups/kubo-data
    volumes:
      - kubo-staging:/export
      - cold-storage:/mnt/backups
      # Small local docker volume for the LevelDB pin metadata. CIFS +
      # LevelDB = corrupt-on-restart, so the 002-split-datastore init
      # symlinks $IPFS_PATH/datastore into this local mount while
      # leaving $IPFS_PATH/blocks on the NAS.
      - kubo-metadata:/data/kubo-metadata
      - ./kubo-init:/container-init.d:ro

volumes:
  postgres-data:
    name: foundation-archive-postgres-data
  hot-storage:
    name: foundation-archive-hot-storage
  cold-storage:
    name: foundation-archive-cold-storage
    driver: local
    driver_opts:
      type: cifs
      device: //${NAS_HOST}/${NAS_SHARE}
      o: addr=${NAS_HOST},username=${NAS_USERNAME},password=${NAS_PASSWORD},vers=${NAS_SMB_VERS:-3.0},uid=1000,gid=1000,file_mode=0664,dir_mode=0775,iocharset=utf8
  kubo-staging:
    name: foundation-archive-kubo-staging
  kubo-metadata:
    name: foundation-archive-kubo-metadata

networks:
  umami_default:
    external: true
