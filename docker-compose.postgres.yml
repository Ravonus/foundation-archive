services:
  postgres:
    image: postgres:16-alpine
    container_name: foundation-archive-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: foundation_archive
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "54329:5432"
    volumes:
      - foundation-archive-postgres-data:/var/lib/postgresql/data

volumes:
  foundation-archive-postgres-data:
