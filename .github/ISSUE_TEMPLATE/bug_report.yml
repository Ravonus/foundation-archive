name: Bug report
description: Report a reproducible problem in foundation-archive
title: "[bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. The more specific you are, the faster it gets fixed.
        **Do not report security issues here** — see [SECURITY.md](../../SECURITY.md).
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: One-sentence description of the problem.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Exact steps. Assume the reader starts from a clean checkout.
      placeholder: |
        1. `pnpm install && pnpm db:start && pnpm db:push`
        2. Run `pnpm worker`
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Include error messages, stack traces, and any unexpected output.
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Node version, pnpm version, browser (if applicable), relevant env vars.
      placeholder: |
        OS: macOS 14.5
        Node: 20.x
        pnpm: 10.29.2
        Browser: Firefox 130
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs / screenshots
      description: Paste logs, redact anything sensitive. Attach screenshots if they help.
    validations:
      required: false
  - type: checkboxes
    id: checks
    attributes:
      label: Pre-flight
      options:
        - label: I searched existing issues and this is not a duplicate
          required: true
        - label: I am not reporting a security vulnerability (those go to SECURITY.md)
          required: true
